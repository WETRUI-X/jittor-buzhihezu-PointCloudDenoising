data_name: &data_name clean.npy
loader: &loader clean_npy

train_dataset:
  shuffle: True
  batch_size: 16
  num_workers: 8
  datapath:
    input_dataset_dir: ./dataset_train_pcd
    use_prob: True
    num_files: 1000
    loader: *loader
    data_name: *data_name
    ignore_check: False
    data_path:
      shapenet: [
        [./datalist/train.txt, 1.0],
      ]

validate_dataset:
  shuffle: False
  batch_size: 1
  num_workers: 8
  datapath:
    input_dataset_dir: ./dataset_train_pcd
    use_prob: False
    loader: *loader
    data_name: *data_name
    ignore_check: False
    data_path:
      shapenet: [
        [./datalist/validate.txt, 1.0],
      ]
